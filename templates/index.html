<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nusantara Engine V2 - ICP2E</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-top: 4px solid #38bdf8; max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; }
        .nft-card { background: #334155; padding: 10px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#38bdf8;">Nusantara Engine V2</h2>
        <p style="text-align:center; font-size:12px;">ICP2E BLITAR RAYA</p>
        <form action="/add-nft" method="post">
            <input type="text" name="name" placeholder="Nama Aset Digital" required>
            <select name="category">
                <option value="2D NFT">2D (Art/Image)</option>
                <option value="3D NFT">3D (Metaverse)</option>
                <option value="Audio">Audio (Ethnic)</option>
            </select>
            <input type="text" name="creator_wallet" placeholder="Alamat Wallet Pi Kreator" required>
            <button type="submit">DAFTARKAN ASET</button>
        </form>
        <hr style="margin:20px 0; border:0.5px solid #334155;">
        <h4>Daftar Aset Terbaru:</h4>
        {% for nft in nfts %}
        <div class="nft-card">
            <strong>{{ nft.name }}</strong> - <small>{{ nft.category }}</small>
        </div>
        {% endfor %}
    </div>
</body>
</html>
