<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nusantara Engine V2 - Dashboard</title>
    <style>
        :root {
            --neon-gold: #ffca28;
            --cyber-blue: #00e5ff;
            --batik-dark: #1a1a1a;
        }
        body {
            background-color: var(--batik-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* Pola Batik Sederhana di Background */
            background-image: radial-gradient(var(--neon-gold) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }
        header {
            border-bottom: 2px solid var(--neon-gold);
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 15px var(--neon-gold);
        }
        .container { padding: 20px; }
        .nft-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--cyber-blue);
            max-width: 500px;
            margin: auto;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            border: 1px solid var(--neon-gold);
            color: white;
        }
        button {
            background: var(--neon-gold);
            color: black;
            border: none;
            padding: 15px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: var(--cyber-blue); }
        .footer-info {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>NUSANTARA ENGINE V2</h1>
    <p style="color: var(--neon-gold);">Cyber-Batik Interface | Pi Network Ecosystem</p>
</header>

<div class="container">
    <div class="nft-form">
        <h3>Minting Aset Mitologi</h3>
        <input type="text" id="name" placeholder="Nama Aset (Contoh: Naga Basuki)">
        <textarea id="desc" placeholder="Deskripsi (Max 140 karakter)"></textarea>
        <input type="text" id="url" placeholder="URL Gambar (8K Octane Render)">
        <button onclick="submitNFT()">Simpan ke Neon Database</button>
    </div>
</div>

<div class="footer-info">
    <p>Developer: <b>Ful21</b> | Community: <b>ICP2E BLITAR RAYA</b></p>
</div>

<script>
    async function submitNFT() {
        const data = {
            name: document.getElementById('name').value,
            description: document.getElementById('desc').value,
            image_url: document.getElementById('url').value
        };

        const response = await fetch('/assets', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        const result = await response.json();
        alert(result.message);
    }
</script>

</body>
</html>
