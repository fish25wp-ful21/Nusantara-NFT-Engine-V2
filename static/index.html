<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nusantara Engine V2</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Nusantara NFT Engine V2 - Manage, Create, and Explore NFTs">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Nusantara NFT Engine V2</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#nft-management">NFT Management</a></li>
                <li><a href="#statistics">Statistics</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Welcome to Nusantara NFT Engine</h2>
            <p>Discover and manage your NFTs with ease.</p>
        </section>
        <section id="gallery">
            <h2>NFT Gallery</h2>
            <div class="gallery-container">
                <!-- Gallery items will be dynamically added here -->
            </div>
        </section>
        <section id="nft-management">
            <h2>NFT Management</h2>
            <form id="nft-form">
                <label for="nft-name">NFT Name:</label>
                <input type="text" id="nft-name" name="nft-name" required>
                <label for="nft-file">Upload File:</label>
                <input type="file" id="nft-file" name="nft-file" accept="image/*" required>
                <button type="submit">Add NFT</button>
            </form>
        </section>
        <section id="statistics">
            <h2>NFT Statistics</h2>
            <div id="stats-container">
                <!-- Stats will be displayed here -->
            </div>
        </section>
    </main>
    <footer>
        <nav class="bottom-navigation">
            <button id="load-more">Load More</button>
        </nav>
        <p>&copy; 2026 Nusantara NFT Engine. All rights reserved.</p>
    </footer>
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <p>Some modal content</p>
        </div>
    </div>
</body>
</html>
